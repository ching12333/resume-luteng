<head>
<meta charset="UTF-8"/>

<title>卢腾 - 简历编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#b0b8c1;font-family:"SimSun","宋体","Microsoft YaHei",Arial,sans-serif;user-select:none;}

/* ===== 工具栏 ===== */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:#1e2a38;display:flex;align-items:center;
  gap:4px;padding:0 10px;z-index:9999;
  box-shadow:0 2px 8px rgba(0,0,0,.5);overflow-x:auto;
}
#toolbar::-webkit-scrollbar{height:3px;}
#toolbar::-webkit-scrollbar-thumb{background:#444;}
.sep{width:1px;height:28px;background:#3d5166;margin:0 3px;flex-shrink:0;}
.tlabel{color:#8aaccc;font-size:11px;font-family:Arial;white-space:nowrap;flex-shrink:0;}
.tbtn{
  background:#2d3e50;border:1px solid #3d5166;color:#ccc;
  padding:4px 8px;border-radius:4px;cursor:pointer;
  font-size:12px;font-family:Arial;white-space:nowrap;flex-shrink:0;
  transition:background .12s;line-height:1.4;
}
.tbtn:hover{background:#3d5166;color:#fff;}
.tbtn.on{background:#2980b9;border-color:#2980b9;color:#fff;}
.tbtn.green{background:#27ae60;border-color:#27ae60;color:#fff;}
.tbtn.green:hover{background:#1e8449;}
.tbtn.orange{background:#e67e22;border-color:#e67e22;color:#fff;}
.tbtn.orange:hover{background:#ca6f1e;}
.tbtn.red{background:#c0392b;border-color:#c0392b;color:#fff;}
.tbtn.red:hover{background:#a93226;}
#tb-fontsize{
  width:46px;padding:3px 4px;border:1px solid #3d5166;
  background:#2d3e50;color:#ddd;border-radius:4px;
  font-size:12px;text-align:center;flex-shrink:0;
}
#tb-color{width:30px;height:26px;border:none;padding:0;cursor:pointer;border-radius:3px;background:none;flex-shrink:0;}
#tb-font{background:#2d3e50;color:#ccc;border:1px solid #3d5166;border-radius:4px;padding:3px 4px;font-size:12px;flex-shrink:0;}

/* 字号快捷按钮 */
.fs-quick{
  background:#253545;border:1px solid #3d5166;color:#aac;
  padding:3px 6px;border-radius:3px;cursor:pointer;
  font-size:11px;font-family:Arial;flex-shrink:0;
}
.fs-quick:hover{background:#2980b9;color:#fff;}

/* 多选提示 */
#multi-badge{
  position:fixed;top:54px;left:50%;transform:translateX(-50%);
  background:#2980b9;color:#fff;font-size:11px;font-family:Arial;
  padding:3px 14px;border-radius:12px;z-index:9998;
  display:none;pointer-events:none;
}

/* 保存状态提示 */
#save-toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:#27ae60;color:#fff;font-size:13px;font-family:Arial;
  padding:8px 24px;border-radius:20px;z-index:9999;
  display:none;box-shadow:0 2px 12px rgba(0,0,0,.3);
}

/* ===== 画布 ===== */
#canvas-wrap{margin:58px auto 40px;width:794px;}
#slide{
  width:794px;min-height:1123px;background:#fff;
  position:relative;box-shadow:0 4px 24px rgba(0,0,0,.35);
  overflow:visible;
}

/* ===== 元素 ===== */
.el{position:absolute;cursor:move;min-width:20px;min-height:12px;}
.el:hover .el-border{opacity:1;}
.el.selected .el-border{opacity:1;border-color:#2980b9;}
.el.multi-sel .el-border{opacity:1;border-color:#e67e22;}
.el-border{
  position:absolute;inset:-2px;
  border:2px dashed rgba(100,160,220,.65);
  border-radius:2px;pointer-events:none;opacity:0;
  transition:opacity .1s;z-index:10;
}
.el.multi-sel .el-border{border-color:rgba(230,126,34,.8);}

/* 控制点 */
.handle{
  position:absolute;width:9px;height:9px;
  background:#fff;border:2px solid #2980b9;
  border-radius:50%;z-index:20;display:none;
}
.el.selected .handle{display:block;}
.handle.nw{top:-6px;left:-6px;cursor:nw-resize;}
.handle.n {top:-6px;left:calc(50% - 4px);cursor:n-resize;}
.handle.ne{top:-6px;right:-6px;cursor:ne-resize;}
.handle.e {top:calc(50% - 4px);right:-6px;cursor:e-resize;}
.handle.se{bottom:-6px;right:-6px;cursor:se-resize;}
.handle.s {bottom:-6px;left:calc(50% - 4px);cursor:s-resize;}
.handle.sw{bottom:-6px;left:-6px;cursor:sw-resize;}
.handle.w {top:calc(50% - 4px);left:-6px;cursor:w-resize;}

/* ===== 文字 ===== */
.el-text{
  width:100%;height:100%;
  overflow:visible;line-height:1.55;
  word-break:break-word;white-space:pre-wrap;
}
.el-text[contenteditable="true"]{
  outline:none;cursor:text;overflow:visible;user-select:text;
}

/* ===== 图片 ===== */
.el-img-wrap{width:100%;height:100%;position:relative;overflow:hidden;}
.el-img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;}
.img-hint{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:11px;font-family:Arial;
  transition:background .15s,color .15s;pointer-events:none;border-radius:2px;
}
.el:hover .img-hint{background:rgba(0,0,0,.4);color:#fff;}

/* ===== 线条 ===== */
.el-line{position:relative;width:100%;height:100%;}
.el-line svg{position:absolute;inset:0;width:100%;height:100%;}

/* ===== 打印 ===== */
@media print{
  body{background:#fff;}
  #toolbar,#multi-badge,#save-toast{display:none!important;}
  #canvas-wrap{margin:0;width:100%;}
  #slide{box-shadow:none;}
  .el-border,.handle,.img-hint{display:none!important;}
}
</style>

<!-- 工具栏 -->
<div id="toolbar">
  <span style="color:#7fb3d3;font-size:13px;font-weight:bold;flex-shrink:0;">✏️ 简历</span>
  <div class="sep"></div>

  <button class="tbtn" onclick="addText()">＋文字</button>
  <button class="tbtn" onclick="addImageEl()">＋图片</button>
  <button class="tbtn" onclick="addLine()">＋横线</button>
  <div class="sep"></div>

  <!-- 字号区域 -->
  <span class="tlabel">字号</span>
  <input id="tb-fontsize" type="number" value="13" min="6" max="200"
    title="输入字号后按 Enter 应用（可先选中部分文字再改）"
    onkeydown="if(event.key==='Enter'){applyFontSize();event.preventDefault();}"/>
  <button class="tbtn" style="padding:4px 6px;" onclick="applyFontSize()" title="应用字号">✓</button>
  <!-- 快捷字号 -->
  <button class="fs-quick" onclick="setFontSize(10)">10</button>
  <button class="fs-quick" onclick="setFontSize(12)">12</button>
  <button class="fs-quick" onclick="setFontSize(14)">14</button>
  <button class="fs-quick" onclick="setFontSize(16)">16</button>
  <button class="fs-quick" onclick="setFontSize(20)">20</button>
  <button class="fs-quick" onclick="setFontSize(28)">28</button>

  <div class="sep"></div>
  <span class="tlabel">颜色</span>
  <input id="tb-color" type="color" value="#111111" onchange="applyColor(this.value)"/>

  <button class="tbtn" id="btn-bold"   onclick="toggleBold()"      title="加粗 Ctrl+B"><b>B</b></button>
  <button class="tbtn" id="btn-italic" onclick="toggleItalic()"    title="斜体 Ctrl+I"><i>I</i></button>
  <button class="tbtn" id="btn-under"  onclick="toggleUnderline()" title="下划线"><u>U</u></button>

  <span class="tlabel">字体</span>
  <select id="tb-font" onchange="applyFontFamily(this.value)">
    <option value="SimSun,宋体,serif">宋体</option>
    <option value="SimHei,黑体,Microsoft YaHei,sans-serif">黑体</option>
    <option value="KaiTi,楷体,STKaiti,serif">楷体</option>
    <option value="Microsoft YaHei,微软雅黑,sans-serif">微软雅黑</option>
    <option value="Arial,sans-serif">Arial</option>
    <option value="Times New Roman,serif">Times New Roman</option>
  </select>
  <div class="sep"></div>

  <button class="tbtn" onclick="bringForward()" title="上移一层">↑层</button>
  <button class="tbtn" onclick="sendBackward()" title="下移一层">↓层</button>
  <button class="tbtn" onclick="alignLeft()"   title="左对齐">⬛←</button>
  <button class="tbtn" onclick="alignCenter()" title="居中">⬛↔</button>
  <button class="tbtn" onclick="alignRight()"  title="右对齐">→⬛</button>
  <div class="sep"></div>

  <button class="tbtn" onclick="replaceSelectedImg()" title="替换选中图片">🖼 换图</button>
  <div class="sep"></div>

  <button class="tbtn" id="btn-undo" onclick="undo()" title="撤销 Ctrl+Z">↩ 撤销</button>
  <button class="tbtn" id="btn-redo" onclick="redo()" title="重做 Ctrl+Y">↪ 重做</button>
  <div class="sep"></div>
  <button class="tbtn red"    onclick="deleteSelected()" title="删除 Delete">🗑 删除</button>
  <button class="tbtn orange" onclick="saveToGitHub()"   title="保存并推送到 GitHub，约1分钟后网址更新">☁ 保存到网址</button>
  <button class="tbtn green"  onclick="saveHTML()">💾 下载</button>
  <button class="tbtn"        onclick="window.print()">🖨️ 打印/PDF</button>
</div>

<div id="multi-badge"></div>
<div id="save-toast"></div>
<input type="file" id="img-file-input" accept="image/*" style="display:none"/>

<div id="canvas-wrap">
  <div id="slide"></div>
</div>

// ============================================================
//  状态
// ============================================================
var selected    = null;
var multiSel    = [];
var editingText = false;
var dragState   = null;
var zCounter    = 10;
var slide       = document.getElementById('slide');

// ============================================================
//  撤销 / 重做 历史栈
// ============================================================
var historyStack = [];  // 存快照（innerHTML 字符串）
var historyIndex = -1;
var MAX_HISTORY  = 50;

function snapshotSlide(){
  // 拍快照前先裁掉当前位置之后的重做分支
  if(historyIndex < historyStack.length - 1){
    historyStack = historyStack.slice(0, historyIndex + 1);
  }
  var clone = slide.cloneNode(true);
  clone.querySelectorAll('.handle,.el-border,.img-hint').forEach(function(n){n.remove();});
  clone.querySelectorAll('.el').forEach(function(el){
    el.classList.remove('selected','multi-sel');
    var inner = el.querySelector('.el-text');
    if(inner) inner.removeAttribute('contenteditable');
  });
  historyStack.push(clone.innerHTML);
  if(historyStack.length > MAX_HISTORY) historyStack.shift();
  historyIndex = historyStack.length - 1;
  updateUndoRedoBtns();
}

function restoreSnapshot(html){
  deselectAll();
  slide.innerHTML = html;
  // 重新绑定事件
  slide.querySelectorAll('.el').forEach(function(el){
    rebindEl(el);
  });
  updateUndoRedoBtns();
}

function undo(){
  if(historyIndex <= 0) return;
  // 如果当前是最新状态且还没快照当前内容，先快照一次
  historyIndex--;
  restoreSnapshot(historyStack[historyIndex]);
}

function redo(){
  if(historyIndex >= historyStack.length - 1) return;
  historyIndex++;
  restoreSnapshot(historyStack[historyIndex]);
}

function updateUndoRedoBtns(){
  var bu = document.getElementById('btn-undo');
  var br = document.getElementById('btn-redo');
  if(bu) bu.style.opacity = historyIndex > 0 ? '1' : '0.4';
  if(br) br.style.opacity = historyIndex < historyStack.length-1 ? '1' : '0.4';
}

// 重新绑定事件（restore 后使用）
function rebindEl(el){
  // 添加缺少的子元素
  if(!el.querySelector('.el-border')){
    var border = document.createElement('div');
    border.className = 'el-border';
    el.insertBefore(border, el.firstChild);
  }
  if(!el.querySelector('.handle')){
    ['nw','n','ne','e','se','s','sw','w'].forEach(function(dir){
      var h = document.createElement('div');
      h.className = 'handle '+dir;
      h.dataset.dir = dir;
      el.appendChild(h);
    });
  }
  if(el.dataset.eltype === 'image' && !el.querySelector('.img-hint')){
    var wrap = el.querySelector('.el-img-wrap');
    if(wrap){
      var hint = document.createElement('div');
      hint.className = 'img-hint'; hint.textContent = '双击替换图片';
      wrap.appendChild(hint);
    }
  }
  el.addEventListener('mousedown', function(e){
    if(e.target.classList.contains('handle')){
      e.stopPropagation(); e.preventDefault();
      deselectAll(); selectEl(el);
      startResize(e, e.target.dataset.dir, el);
      return;
    }
    if(editingText && el === selected) return;
    e.stopPropagation();
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      toggleMultiSel(el);
    } else {
      if(multiSel.length > 1 && multiSel.indexOf(el) !== -1){
        startMoveGroup(e);
      } else {
        deselectAll(); selectEl(el); startMove(e, el);
      }
    }
  });
  if(el.dataset.eltype === 'text'){
    el.addEventListener('dblclick', function(e){ e.stopPropagation(); startTextEdit(el); });
  } else if(el.dataset.eltype === 'image'){
    el.addEventListener('dblclick', function(e){ e.stopPropagation(); replaceImgEl(el); });
  }
}

// ============================================================
//  初始化
// ============================================================
function init(){
  INIT_ELEMENTS.forEach(createEl);
  slide.addEventListener('mousedown', function(e){
    if(e.target === slide) deselectAll();
  });
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('keydown',   onKeyDown);
  // 初始化完成后快照一次作为基线
  setTimeout(snapshotSlide, 100);
  updateUndoRedoBtns();
}

// ============================================================
//  创建元素
// ============================================================
function createEl(d){
  var el = document.createElement('div');
  el.className = 'el';
  el.id = d.id || ('el_'+Date.now()+Math.random().toString(36).slice(2));
  var zVal = d.z ? d.z : (++zCounter);
  if(d.z && d.z > zCounter) zCounter = d.z;
  el.style.cssText = 'left:'+d.x+'px;top:'+d.y+'px;width:'+d.w+'px;height:'+d.h+'px;z-index:'+zVal+';';

  var border = document.createElement('div');
  border.className = 'el-border';
  el.appendChild(border);

  ['nw','n','ne','e','se','s','sw','w'].forEach(function(dir){
    var h = document.createElement('div');
    h.className = 'handle '+dir;
    h.dataset.dir = dir;
    el.appendChild(h);
  });

  if(d.type === 'text'){
    el.dataset.eltype = 'text';
    var inner = document.createElement('div');
    inner.className = 'el-text';
    inner.innerHTML = d.html || '';
    el.appendChild(inner);
    el.addEventListener('dblclick', function(e){ e.stopPropagation(); startTextEdit(el); });

  } else if(d.type === 'image'){
    el.dataset.eltype = 'image';
    var wrap = document.createElement('div');
    wrap.className = 'el-img-wrap';
    var img = document.createElement('img');
    img.className = 'el-img'; img.src = d.src||''; img.alt='';
    var hint = document.createElement('div');
    hint.className = 'img-hint'; hint.textContent = '双击替换图片';
    wrap.appendChild(img); wrap.appendChild(hint);
    el.appendChild(wrap);
    el.addEventListener('dblclick', function(e){ e.stopPropagation(); replaceImgEl(el); });

  } else if(d.type === 'line'){
    el.dataset.eltype = 'line';
    var lw = document.createElement('div');
    lw.className = 'el-line';
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('preserveAspectRatio','none');
    var ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1','0'); ln.setAttribute('y1','50%');
    ln.setAttribute('x2','100%'); ln.setAttribute('y2','50%');
    ln.setAttribute('stroke', d.color||'#2c3e50');
    ln.setAttribute('stroke-width','2');
    svg.appendChild(ln); lw.appendChild(svg); el.appendChild(lw);
  }

  el.addEventListener('mousedown', function(e){
    if(e.target.classList.contains('handle')){
      e.stopPropagation(); e.preventDefault();
      deselectAll(); selectEl(el);
      startResize(e, e.target.dataset.dir, el);
      return;
    }
    if(editingText && el === selected) return;
    e.stopPropagation();
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      toggleMultiSel(el);
    } else {
      if(multiSel.length > 1 && multiSel.indexOf(el) !== -1){
        startMoveGroup(e);
      } else {
        deselectAll(); selectEl(el); startMove(e, el);
      }
    }
  });

  slide.appendChild(el);
  return el;
}

// ============================================================
//  选中 / 多选 / 取消
// ============================================================
function selectEl(el){
  if(selected && selected !== el) stopTextEdit(selected);
  if(selected) selected.classList.remove('selected');
  selected = el;
  el.classList.add('selected');
  if(multiSel.indexOf(el) === -1) multiSel = [el];
  syncToolbar(el);
  updateMultiBadge();
}

function toggleMultiSel(el){
  stopTextEdit(selected);
  var idx = multiSel.indexOf(el);
  if(idx !== -1){
    el.classList.remove('selected','multi-sel');
    multiSel.splice(idx,1);
    if(selected === el){
      selected = multiSel.length ? multiSel[multiSel.length-1] : null;
      if(selected){ selected.classList.remove('multi-sel'); selected.classList.add('selected'); }
    }
  } else {
    if(selected){ selected.classList.remove('selected'); selected.classList.add('multi-sel'); }
    multiSel.push(el);
    el.classList.remove('multi-sel'); el.classList.add('selected');
    selected = el;
  }
  syncToolbar(selected);
  updateMultiBadge();
}

function deselectAll(){
  stopTextEdit(selected);
  multiSel.forEach(function(el){ el.classList.remove('selected','multi-sel'); });
  multiSel = []; selected = null;
  updateMultiBadge();
}

function updateMultiBadge(){
  var badge = document.getElementById('multi-badge');
  if(multiSel.length > 1){
    badge.textContent = '已选中 '+multiSel.length+' 个元素（可一起拖动）';
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
}

function syncToolbar(el){
  if(!el) return;
  var inner = el.querySelector('.el-text');
  if(inner){
    // 读取第一个 span 的字号，或 inner 自身
    var firstSpan = inner.querySelector('[style*="font-size"]');
    var fs = firstSpan
      ? parseFloat(firstSpan.style.fontSize)
      : parseFloat(inner.style.fontSize) || 13;
    document.getElementById('tb-fontsize').value = fs || 13;
  }
}

// ============================================================
//  文字编辑
// ============================================================
function startTextEdit(el){
  var inner = el.querySelector('.el-text');
  if(!inner) return;
  inner.contentEditable = 'true';
  inner.style.cursor = 'text';
  inner.style.userSelect = 'text';
  editingText = true;
  inner.focus();
  if(!inner._mdBound){
    inner._mdBound = true;
    inner.addEventListener('mousedown', function(e){ e.stopPropagation(); });
    // 选区变化时同步字号显示
    inner.addEventListener('keyup',    syncSelectionFontSize);
    inner.addEventListener('mouseup',  syncSelectionFontSize);
  }
}

function stopTextEdit(el){
  if(!el) return;
  var inner = el.querySelector('.el-text');
  if(inner && inner.contentEditable === 'true'){
    inner.contentEditable='false'; inner.style.cursor=''; inner.style.userSelect='';
    snapshotSlide(); // 文字编辑结束后自动快照
  }
  editingText = false;
}

// 读取当前光标处字号并同步到工具栏
function syncSelectionFontSize(){
  var sel = window.getSelection();
  if(!sel || sel.rangeCount === 0) return;
  var node = sel.anchorNode;
  if(!node) return;
  var el = node.nodeType === 3 ? node.parentElement : node;
  // 向上找最近有 font-size 的元素
  while(el && el.className !== 'el-text'){
    if(el.style && el.style.fontSize){
      document.getElementById('tb-fontsize').value = parseFloat(el.style.fontSize);
      return;
    }
    el = el.parentElement;
  }
}

// ============================================================
//  ★ 字体大小（核心修复）
//  原理：用 <span style="font-size:Xpx"> 包裹选区，避免 execCommand 兼容问题
// ============================================================
function applyFontSize(){
  var fs = parseFloat(document.getElementById('tb-fontsize').value);
  if(!fs || fs < 1) return;
  setFontSize(fs);
}

function setFontSize(fs){
  document.getElementById('tb-fontsize').value = fs;
  if(editingText && selected){
    var inner = selected.querySelector('.el-text');
    if(!inner) return;
    inner.focus();
    var sel = window.getSelection();
    // ★ 有选区 → 只改选中文字
    if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
      var range = sel.getRangeAt(0);
      // 提取选区内容
      var fragment = range.extractContents();
      var span = document.createElement('span');
      span.style.fontSize = fs + 'px';
      span.appendChild(fragment);
      range.insertNode(span);
      // 重新选中新 span
      var newRange = document.createRange();
      newRange.selectNodeContents(span);
      sel.removeAllRanges();
      sel.addRange(newRange);
    } else {
      // 无选区 → 改整个文字块
      inner.style.fontSize = fs + 'px';
    }
  } else if(selected){
    // 非编辑模式 → 改整个块
    var inner = selected.querySelector('.el-text');
    if(inner) inner.style.fontSize = fs + 'px';
  }
}

// ============================================================
//  颜色
// ============================================================
function applyColor(val){
  if(editingText && selected){
    var inner = selected.querySelector('.el-text');
    if(!inner) return;
    inner.focus();
    var sel = window.getSelection();
    if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
      var range = sel.getRangeAt(0);
      var fragment = range.extractContents();
      var span = document.createElement('span');
      span.style.color = val;
      span.appendChild(fragment);
      range.insertNode(span);
    } else {
      inner.style.color = val;
    }
  } else if(selected){
    var inner = selected.querySelector('.el-text');
    if(inner) inner.style.color = val;
  }
}

// ============================================================
//  加粗 / 斜体 / 下划线
// ============================================================
function wrapSelection(styleProp, onVal, offVal){
  if(!editingText || !selected) return;
  var inner = selected.querySelector('.el-text');
  if(!inner) return;
  inner.focus();
  var sel = window.getSelection();
  if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
    var range = sel.getRangeAt(0);
    var fragment = range.extractContents();
    var span = document.createElement('span');
    span.style[styleProp] = onVal;
    span.appendChild(fragment);
    range.insertNode(span);
  } else {
    var cur = inner.style[styleProp];
    inner.style[styleProp] = (cur === onVal) ? offVal : onVal;
  }
}

function toggleBold(){
  if(editingText && selected){
    var inner = selected.querySelector('.el-text');
    if(!inner) return;
    inner.focus();
    var sel = window.getSelection();
    if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
      document.execCommand('bold');
    } else {
      inner.style.fontWeight = inner.style.fontWeight === 'bold' ? '' : 'bold';
    }
  } else if(selected){
    var inner = selected.querySelector('.el-text');
    if(inner) inner.style.fontWeight = inner.style.fontWeight === 'bold' ? '' : 'bold';
  }
}

function applyFontFamily(val){

// ============================================================
//  移动（单个 / 多选组）
// ============================================================
function startMove(e, el){
  dragState = {
    type:'move', el:el,
    startX:e.clientX, startY:e.clientY,
    origX:parseInt(el.style.left)||0,
    origY:parseInt(el.style.top)||0
  };
}

function startMoveGroup(e){
  var snapshots = multiSel.map(function(el){
    return { el:el, origX:parseInt(el.style.left)||0, origY:parseInt(el.style.top)||0 };
  });
  dragState = { type:'moveGroup', startX:e.clientX, startY:e.clientY, snapshots:snapshots };
}

function startResize(e, dir, el){
  dragState = {
    type:'resize', dir:dir, el:el,
    startX:e.clientX, startY:e.clientY,
    origX:parseInt(el.style.left)||0,
    origY:parseInt(el.style.top)||0,
    origW:parseInt(el.style.width)||100,
    origH:parseInt(el.style.height)||20
  };
}

function onMouseMove(e){
  if(!dragState) return;
  var dx = e.clientX - dragState.startX;
  var dy = e.clientY - dragState.startY;
  if(dragState.type === 'move'){
    dragState.el.style.left = Math.max(0, dragState.origX+dx)+'px';
    dragState.el.style.top  = Math.max(0, dragState.origY+dy)+'px';
  } else if(dragState.type === 'moveGroup'){
    dragState.snapshots.forEach(function(s){
      s.el.style.left = Math.max(0, s.origX+dx)+'px';
      s.el.style.top  = Math.max(0, s.origY+dy)+'px';
    });
  } else if(dragState.type === 'resize'){
    var d=dragState.dir, el=dragState.el;
    var nx=dragState.origX, ny=dragState.origY;
    var nw=dragState.origW, nh=dragState.origH;
    if(d.includes('e')) nw=Math.max(20,dragState.origW+dx);
    if(d.includes('s')) nh=Math.max(10,dragState.origH+dy);
    if(d.includes('w')){ nw=Math.max(20,dragState.origW-dx); nx=dragState.origX+dragState.origW-nw; }
    if(d.includes('n')){ nh=Math.max(10,dragState.origH-dy); ny=dragState.origY+dragState.origH-nh; }
    el.style.left=nx+'px'; el.style.top=ny+'px';
    el.style.width=nw+'px'; el.style.height=nh+'px';
  }
}
function onMouseUp(){
  if(dragState && (dragState.type==='move'||dragState.type==='moveGroup'||dragState.type==='resize')){
    snapshotSlide(); // 拖拽/缩放结束后自动快照
  }
  dragState=null;
}

// ============================================================
//  键盘
// ============================================================
function onKeyDown(e){
  if(editingText) return;
  var tag = document.activeElement.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA') return;
  if(e.key==='Delete'||e.key==='Backspace'){ deleteSelected(); snapshotSlide(); return; }
  var step = e.shiftKey ? 10 : 1;
  var targets = multiSel.length ? multiSel : (selected ? [selected] : []);
  if(!targets.length) return;
  if(e.key==='ArrowLeft'){  targets.forEach(function(el){ el.style.left=(parseInt(el.style.left)-step)+'px'; }); e.preventDefault(); }
  if(e.key==='ArrowRight'){ targets.forEach(function(el){ el.style.left=(parseInt(el.style.left)+step)+'px'; }); e.preventDefault(); }
  if(e.key==='ArrowUp'){    targets.forEach(function(el){ el.style.top=(parseInt(el.style.top)-step)+'px'; }); e.preventDefault(); }
  if(e.key==='ArrowDown'){  targets.forEach(function(el){ el.style.top=(parseInt(el.style.top)+step)+'px'; }); e.preventDefault(); }
  if((e.ctrlKey||e.metaKey) && e.key==='z'){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key==='y'||e.key==='Y')){ e.preventDefault(); redo(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='a'){
    e.preventDefault();
    deselectAll();
    slide.querySelectorAll('.el').forEach(function(el){ multiSel.push(el); el.classList.add('multi-sel'); });
    if(multiSel.length){ selected=multiSel[multiSel.length-1]; selected.classList.remove('multi-sel'); selected.classList.add('selected'); }
    updateMultiBadge();
  }
}

// ============================================================
//  工具栏操作
// ============================================================
function bringForward(){ if(selected) selected.style.zIndex=++zCounter; }
function sendBackward(){ if(selected){ var z=parseInt(selected.style.zIndex); if(z>1) selected.style.zIndex=z-1; } }
function alignLeft(){   var t=multiSel.length?multiSel:(selected?[selected]:[]); t.forEach(function(el){el.style.left='28px';}); }
function alignCenter(){ var t=multiSel.length?multiSel:(selected?[selected]:[]); t.forEach(function(el){var w=parseInt(el.style.width);el.style.left=Math.round((794-w)/2)+'px';}); }
function alignRight(){  var t=multiSel.length?multiSel:(selected?[selected]:[]); t.forEach(function(el){var w=parseInt(el.style.width);el.style.left=(794-w-28)+'px';}); }
function deleteSelected(){
  var t=multiSel.slice(); t.forEach(function(el){el.remove();});
  multiSel=[]; selected=null; editingText=false; updateMultiBadge();
  snapshotSlide();
}

function addText(){
  var el=createEl({type:'text',x:100,y:200,w:300,h:30,html:'<span style="font-size:14px;color:#111;">双击编辑文字</span>'});
  deselectAll(); selectEl(el);
}
function addImageEl(){
  var fi=document.getElementById('img-file-input');
  fi.onchange=function(e){
    var file=e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(ev){ var el=createEl({type:'image',x:100,y:200,w:120,h:120,src:ev.target.result}); deselectAll(); selectEl(el); };
    r.readAsDataURL(file); fi.value='';
  };
  fi.click();
}
function addLine(){
  var el=createEl({type:'line',x:28,y:300,w:730,h:4,color:'#2c3e50'});
  deselectAll(); selectEl(el);
}
function replaceSelectedImg(){
  if(!selected||selected.dataset.eltype!=='image') return;
  replaceImgEl(selected);
}
function replaceImgEl(el){
  var fi=document.getElementById('img-file-input');
  fi.onchange=function(e){
    var file=e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(ev){ var img=el.querySelector('.el-img'); if(img) img.src=ev.target.result; };
    r.readAsDataURL(file); fi.value='';
  };
  fi.click();
}

// ============================================================
//  序列化当前元素状态为 JSON（保存用）
// ============================================================
function serializeElements(){
  var result = [];
  slide.querySelectorAll('.el').forEach(function(el){
    var type = el.dataset.eltype;
    var item = {
      id: el.id,
      type: type,
      x: parseInt(el.style.left)||0,
      y: parseInt(el.style.top)||0,
      w: parseInt(el.style.width)||100,
      h: parseInt(el.style.height)||20,
      z: parseInt(el.style.zIndex)||10
    };
    if(type==='text'){
      var inner = el.querySelector('.el-text');
      item.html = inner ? inner.innerHTML : '';
    } else if(type==='image'){
      var img = el.querySelector('.el-img');
      item.src = img ? img.src : '';
    } else if(type==='line'){
      var ln = el.querySelector('line');
      item.color = ln ? ln.getAttribute('stroke') : '#2c3e50';
    }
    result.push(item);
  });
  return result;
}

// ============================================================
//  生成完整编辑器 HTML（保存到 GitHub 用）
//  原理：把当前所有元素的实时状态序列化为 JSON，
//  替换页面中的 INIT_ELEMENTS，这样下次打开仍是完整编辑器
// ============================================================
function buildEditorHTML(){
  var currentElements = serializeElements();
  var elementsJSON = JSON.stringify(currentElements, null, 2);
  // 读取当前页面源码
  var src = document.documentElement.outerHTML;
  // 替换 INIT_ELEMENTS 数据块（从 var INIT_ELEMENTS = [ 到 ];）
  var re = /var INIT_ELEMENTS\s*=\s*\[([\s\S]*?)\];/;
  src = src.replace(re, 'var INIT_ELEMENTS = ' + elementsJSON + ';');
  // 移除所有元素的 selected/multi-sel 类
  src = src.replace(/class="el selected"/g, 'class="el"');
  src = src.replace(/class="el multi-sel"/g, 'class="el"');
  return src;
}

// ============================================================
//  ★ 一键保存到 GitHub
//  原理：从 GitHub 拉取原始源码 → 只替换 INIT_ELEMENTS 数据 → 推送
//  这样 JS 代码永远完整，打开后仍可编辑
// ============================================================
function saveToGitHub(){
  var toast = document.getElementById('save-toast');
  toast.textContent = '⏳ 正在保存到 GitHub...';
  toast.style.background = '#2980b9';
  toast.style.display = 'block';

  var currentElements = serializeElements();
  var elementsJSON = JSON.stringify(currentElements, null, 2);

  var apiBase = 'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_PATH;

  // Step 1: 从 GitHub 拉取原始源码（base64）和 SHA
  fetch(apiBase+'?ref='+GH_BRANCH, {
    headers: { 'Authorization': 'token '+GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var sha = data.sha;
    // Step 2: 解码原始源码
    var rawHTML = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    // Step 3: 只替换 INIT_ELEMENTS 数据块，保留所有 JS 代码完整
    var re = /var INIT_ELEMENTS\s*=\s*\[[\s\S]*?\];/;
    var newHTML = rawHTML.replace(re, 'var INIT_ELEMENTS = ' + elementsJSON + ';');
    if(!re.test(rawHTML)){
      toast.textContent = '❌ 未找到 INIT_ELEMENTS 标记，保存失败';
      toast.style.background = '#c0392b';
      setTimeout(function(){ toast.style.display='none'; }, 4000);
      return null;
    }
    var encoded = btoa(unescape(encodeURIComponent(newHTML)));
    // Step 4: 推送回 GitHub
    return fetch(apiBase, {
      method: 'PUT',
      headers: {
        'Authorization': 'token '+GH_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: '简历更新 '+new Date().toLocaleString('zh-CN'),
        content: encoded,
        sha: sha,
        branch: GH_BRANCH
      })
    });
  })
  .then(function(r){ if(!r) return null; return r.json(); })
  .then(function(data){
    if(!data) return;
    if(data.content || data.commit){
      toast.textContent = '✅ 已保存！约 1 分钟后网址自动更新（仍可继续编辑）';
      toast.style.background = '#27ae60';
    } else {
      toast.textContent = '❌ 保存失败：'+(data.message||'未知错误');
      toast.style.background = '#c0392b';
    }
    setTimeout(function(){ toast.style.display='none'; }, 5000);
  })
  .catch(function(err){
    toast.textContent = '❌ 网络错误：'+err.message;
    toast.style.background = '#c0392b';
    setTimeout(function(){ toast.style.display='none'; }, 4000);
  });
}

// ============================================================
//  下载 HTML
// ============================================================
function saveHTML(){
  var out = buildEditorHTML();
  var blob = new Blob([out],{type:'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download='卢腾-简历.html'; a.click();
}

// ============================================================
//  工具函数
// ============================================================
function rgbToHex(rgb){
  if(!rgb) return '#111111';
  if(rgb.startsWith('#')) return rgb;
  var m=rgb.match(/\d+/g);
  if(!m||m.length<3) return '#111111';
  return '#'+m.slice(0,3).map(function(x){return('0'+parseInt(x).toString(16)).slice(-2);}).join('');
}
