<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>卢腾 - 简历编辑器</title>
<style>
/* ===== 全局 ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#b0b8c1;font-family:"SimSun","宋体","Microsoft YaHei",Arial,sans-serif;user-select:none;}

/* ===== 工具栏 ===== */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:#1e2a38;display:flex;align-items:center;
  gap:6px;padding:0 16px;z-index:9999;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  flex-wrap:wrap;
}
#toolbar .sep{width:1px;height:28px;background:#444;margin:0 4px;}
#toolbar label{color:#aaa;font-size:11px;font-family:Arial;}
.tbtn{
  background:#2d3e50;border:1px solid #3d5166;color:#ddd;
  padding:5px 11px;border-radius:4px;cursor:pointer;
  font-size:12px;font-family:Arial;white-space:nowrap;
  transition:background .15s;
}
.tbtn:hover{background:#3d5166;}
.tbtn.active{background:#2980b9;border-color:#2980b9;color:#fff;}
.tbtn.green{background:#27ae60;border-color:#27ae60;color:#fff;}
.tbtn.green:hover{background:#1e8449;}
.tbtn.red{background:#c0392b;border-color:#c0392b;color:#fff;}
#font-size-input{
  width:44px;padding:4px 5px;border:1px solid #3d5166;
  background:#2d3e50;color:#ddd;border-radius:4px;
  font-size:12px;text-align:center;
}
#color-input{width:32px;height:28px;border:none;padding:0;cursor:pointer;border-radius:3px;background:none;}

/* ===== 画布区 ===== */
#canvas-wrap{
  margin:60px auto 40px;
  width:794px;
  position:relative;
}

/* ===== A4 简历纸 ===== */
#slide{
  width:794px;min-height:1123px;
  background:#fff;
  position:relative;
  box-shadow:0 4px 24px rgba(0,0,0,0.35);
  overflow:hidden;
}

/* ===== 每个可编辑元素块 ===== */
.el{
  position:absolute;
  cursor:move;
  min-width:20px;min-height:16px;
}
.el:hover .el-border{opacity:1;}
.el.selected .el-border{opacity:1;border-color:#2980b9;}

/* 选中/悬停边框 */
.el-border{
  position:absolute;inset:-2px;
  border:2px dashed rgba(100,160,220,0.7);
  border-radius:2px;pointer-events:none;
  opacity:0;transition:opacity .1s;
  z-index:10;
}

/* 8个控制点 */
.handle{
  position:absolute;width:9px;height:9px;
  background:#fff;border:2px solid #2980b9;
  border-radius:50%;z-index:20;
  display:none;
}
.el.selected .handle{display:block;}
.handle.nw{top:-6px;left:-6px;cursor:nw-resize;}
.handle.n {top:-6px;left:50%;transform:translateX(-50%);cursor:n-resize;}
.handle.ne{top:-6px;right:-6px;cursor:ne-resize;}
.handle.e {top:50%;right:-6px;transform:translateY(-50%);cursor:e-resize;}
.handle.se{bottom:-6px;right:-6px;cursor:se-resize;}
.handle.s {bottom:-6px;left:50%;transform:translateX(-50%);cursor:s-resize;}
.handle.sw{bottom:-6px;left:-6px;cursor:sw-resize;}
.handle.w {top:50%;left:-6px;transform:translateY(-50%);cursor:w-resize;}

/* ===== 文字元素内容 ===== */
.el-text{
  width:100%;height:100%;
  overflow:hidden;
  line-height:1.5;
  word-break:break-word;
  white-space:pre-wrap;
}
.el-text[contenteditable="true"]{
  outline:none;cursor:text;
  overflow:auto;
}

/* ===== 图片元素 ===== */
.el-img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
  pointer-events:none;
}

/* ===== 线条元素 ===== */
.el-line{
  width:100%;height:100%;
  position:relative;
}
.el-line svg{position:absolute;inset:0;width:100%;height:100%;}

/* ===== 删除提示 ===== */
#del-hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);color:#fff;padding:6px 16px;
  border-radius:20px;font-size:12px;font-family:Arial;
  display:none;z-index:9999;pointer-events:none;
}

/* ===== 打印 ===== */
@media print{
  body{background:#fff;}
  #toolbar,#del-hint{display:none!important;}
  #canvas-wrap{margin:0;width:100%;}
  #slide{box-shadow:none;width:100%;}
  .el-border,.handle{display:none!important;}
}
</style>
</head>

<!-- ===== 工具栏 ===== -->
<div id="toolbar">
  <span style="color:#7fb3d3;font-size:13px;font-weight:bold;margin-right:4px;">✏️ 简历编辑器</span>
  <div class="sep"></div>

  <!-- 添加元素 -->
  <button class="tbtn" onclick="addText()">＋ 文字</button>
  <button class="tbtn" onclick="addImage()">＋ 图片</button>
  <button class="tbtn" onclick="addLine()">＋ 横线</button>

  <div class="sep"></div>

  <!-- 字体大小 -->
  <label>字号</label>
  <input id="font-size-input" type="number" value="13" min="6" max="120" onchange="applyFontSize(this.value)"/>

  <!-- 颜色 -->
  <label>颜色</label>
  <input id="color-input" type="color" value="#111111" onchange="applyColor(this.value)" title="文字颜色"/>

  <!-- 加粗/斜体 -->
  <button class="tbtn" id="btn-bold" onclick="applyBold()" title="加粗 Ctrl+B"><b>B</b></button>
  <button class="tbtn" id="btn-italic" onclick="applyItalic()" title="斜体 Ctrl+I"><i>I</i></button>

  <div class="sep"></div>

  <!-- 层级 -->
  <button class="tbtn" onclick="bringForward()" title="上移一层">↑层</button>
  <button class="tbtn" onclick="sendBackward()" title="下移一层">↓层</button>

  <!-- 对齐 -->
  <button class="tbtn" onclick="alignLeft()" title="左对齐">⬛←</button>
  <button class="tbtn" onclick="alignCenter()" title="水平居中">⬛↔</button>
  <button class="tbtn" onclick="alignRight()" title="右对齐">→⬛</button>

  <div class="sep"></div>

  <!-- 删除 -->
  <button class="tbtn red" onclick="deleteSelected()" title="删除选中 Delete">🗑 删除</button>

  <div class="sep"></div>

  <!-- 保存/打印 -->
  <button class="tbtn green" onclick="saveHTML()">💾 保存</button>
  <button class="tbtn" onclick="window.print()">🖨️ 打印/PDF</button>
</div>

<!-- 隐藏文件输入 -->
<input type="file" id="img-file-input" accept="image/*" style="display:none"/>

<!-- ===== 画布 ===== -->
<div id="canvas-wrap">
<div id="slide"></div>
</div>

<div id="del-hint">按 Delete 键删除选中元素</div>

  var border = document.createElement('div');
  border.className = 'el-border';
  el.appendChild(border);

  // 8个控制点
  ['nw','n','ne','e','se','s','sw','w'].forEach(function(dir){
    var h = document.createElement('div');
    h.className = 'handle ' + dir;
    h.dataset.dir = dir;
    el.appendChild(h);
  });

  // 内容
  if(d.type === 'text'){
    var inner = document.createElement('div');
    inner.className = 'el-text';
    inner.innerHTML = d.html || '';
    inner.style.fontSize = (d.fontSize || 13) + 'px';
    inner.style.color = d.color || '#111';
    el.appendChild(inner);

    // 双击进入编辑
    el.addEventListener('dblclick', function(e){
      e.stopPropagation();
      startTextEdit(el);
    });
  } else if(d.type === 'image'){
    var img = document.createElement('img');
    img.className = 'el-img';
    img.src = d.src || '';
    img.alt = '';
    el.appendChild(img);
    // 双击替换图片
    el.addEventListener('dblclick', function(e){
      e.stopPropagation();
      replaceImg(el);
    });
  } else if(d.type === 'line'){
    var lw = document.createElement('div');
    lw.className = 'el-line';
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('preserveAspectRatio','none');
    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','0'); line.setAttribute('y1','50%');
    line.setAttribute('x2','100%'); line.setAttribute('y2','50%');
    line.setAttribute('stroke', d.color || '#2c3e50');
    line.setAttribute('stroke-width','2');
    svg.appendChild(line);
    lw.appendChild(svg);
    el.appendChild(lw);
  }

  // 鼠标按下：移动或选中
  el.addEventListener('mousedown', function(e){
    if(e.target.classList.contains('handle')){
      e.stopPropagation(); e.preventDefault();
      selectEl(el);
      startResize(e, e.target.dataset.dir, el);
      return;
    }
    if(editingText && el === selected) return;
    e.stopPropagation();
    selectEl(el);
    startMove(e, el);
  });

  slide.appendChild(el);
  return el;
}

// ============================================================
//  选中 / 取消
// ============================================================
function selectEl(el){
  if(selected && selected !== el){
    stopTextEdit(selected);
  }
  if(selected) selected.classList.remove('selected');
  selected = el;
  el.classList.add('selected');
  // 同步工具栏
  var inner = el.querySelector('.el-text');
  if(inner){
    document.getElementById('font-size-input').value = parseFloat(inner.style.fontSize) || 13;
    document.getElementById('color-input').value = rgbToHex(inner.style.color) || '#111111';
  }
  var hint = document.getElementById('del-hint');
  hint.style.display = 'block';
  clearTimeout(hint._t);
  hint._t = setTimeout(function(){ hint.style.display='none'; }, 2000);
}

function deselect(){
  if(selected){
    stopTextEdit(selected);
    selected.classList.remove('selected');
    selected = null;
  }
}

// ============================================================
//  文字编辑
// ============================================================
function startTextEdit(el){
  var inner = el.querySelector('.el-text');
  if(!inner) return;
  inner.contentEditable = 'true';
  inner.style.cursor = 'text';
  editingText = true;
  inner.focus();
  // 防止拖拽时误触
  inner.addEventListener('mousedown', function(e){ e.stopPropagation(); });
}

function stopTextEdit(el){
  if(!el) return;
  var inner = el.querySelector('.el-text');
  if(inner){
    inner.contentEditable = 'false';
    inner.style.cursor = '';
  }
  editingText = false;
}

// ============================================================
//  拖拽移动
// ============================================================
function startMove(e, el){
  if(editingText) return;
  dragState = {
    type: 'move',
    el: el,
    startX: e.clientX,
    startY: e.clientY,
    origX: parseInt(el.style.left),
    origY: parseInt(el.style.top)
  };
}

// ============================================================
//  拉伸调整大小
// ============================================================
function startResize(e, dir, el){
  dragState = {
    type: 'resize',
    dir: dir,
    el: el,
    startX: e.clientX,
    startY: e.clientY,
    origX: parseInt(el.style.left),
    origY: parseInt(el.style.top),
    origW: parseInt(el.style.width),
    origH: parseInt(el.style.height)
  };
}

// ============================================================
//  全局鼠标移动
// ============================================================
function onMouseMove(e){
  if(!dragState) return;
  var dx = e.clientX - dragState.startX;
  var dy = e.clientY - dragState.startY;
  var el = dragState.el;

  if(dragState.type === 'move'){
    el.style.left = Math.max(0, dragState.origX + dx) + 'px';
    el.style.top  = Math.max(0, dragState.origY + dy) + 'px';
  } else if(dragState.type === 'resize'){
    var d = dragState.dir;
    var nx = dragState.origX, ny = dragState.origY;
    var nw = dragState.origW, nh = dragState.origH;

    if(d.includes('e')) nw = Math.max(20, dragState.origW + dx);
    if(d.includes('s')) nh = Math.max(10, dragState.origH + dy);
    if(d.includes('w')){ nw = Math.max(20, dragState.origW - dx); nx = dragState.origX + dragState.origW - nw; }
    if(d.includes('n')){ nh = Math.max(10, dragState.origH - dy); ny = dragState.origY + dragState.origH - nh; }

    el.style.left   = nx + 'px';
    el.style.top    = ny + 'px';
    el.style.width  = nw + 'px';
    el.style.height = nh + 'px';
  }
}

function onMouseUp(){
  dragState = null;
}

// ============================================================
//  键盘
// ============================================================
function onKeyDown(e){
  if(editingText) return;
  if(!selected) return;
  if(e.key === 'Delete' || e.key === 'Backspace'){
    if(document.activeElement.tagName !== 'INPUT'){
      deleteSelected();
    }
  }
  // 方向键微调
  var step = e.shiftKey ? 10 : 1;
  if(e.key === 'ArrowLeft'){ selected.style.left = (parseInt(selected.style.left)-step)+'px'; e.preventDefault(); }
  if(e.key === 'ArrowRight'){ selected.style.left = (parseInt(selected.style.left)+step)+'px'; e.preventDefault(); }
  if(e.key === 'ArrowUp'){ selected.style.top = (parseInt(selected.style.top)-step)+'px'; e.preventDefault(); }
  if(e.key === 'ArrowDown'){ selected.style.top = (parseInt(selected.style.top)+step)+'px'; e.preventDefault(); }
}

// ============================================================
//  工具栏功能
// ============================================================
function applyFontSize(v){
  if(!selected) return;
  var inner = selected.querySelector('.el-text');
  if(inner) inner.style.fontSize = v + 'px';
}

function applyColor(v){
  if(!selected) return;
  var inner = selected.querySelector('.el-text');
  if(inner) inner.style.color = v;
}

function applyBold(){
  if(!selected) return;
  var inner = selected.querySelector('.el-text');
  if(!inner) return;
  inner.style.fontWeight = inner.style.fontWeight === 'bold' ? '' : 'bold';
}

function applyItalic(){
  if(!selected) return;
  var inner = selected.querySelector('.el-text');
  if(!inner) return;
  inner.style.fontStyle = inner.style.fontStyle === 'italic' ? '' : 'italic';
}

function bringForward(){
  if(selected) selected.style.zIndex = ++zCounter;
}
function sendBackward(){
  if(selected){ var z = parseInt(selected.style.zIndex); if(z>1) selected.style.zIndex = z-1; }
}

function alignLeft(){
  if(selected) selected.style.left = '28px';
}
function alignCenter(){
  if(selected){
    var w = parseInt(selected.style.width);
    selected.style.left = Math.round((794-w)/2) + 'px';
  }
}
function alignRight(){
  if(selected){
    var w = parseInt(selected.style.width);
    selected.style.left = (794-w-28) + 'px';
  }
}

function deleteSelected(){
  if(selected){
    selected.remove();
    selected = null;
    editingText = false;
  }
}

// ---- 添加文字 ----
function addText(){
  var d = {
    id: 'e_new_' + Date.now(),
    type: 'text',
    x: 100, y: 200, w: 300, h: 30,
    html: '双击编辑文字',
    fontSize: 14, color: '#111'
  };
  var el = createEl(d);
  selectEl(el);
}

// ---- 添加图片 ----
function addImage(){
  var fi = document.getElementById('img-file-input');
  fi.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var d = {
        id: 'e_img_' + Date.now(),
        type: 'image',
        x: 100, y: 200, w: 120, h: 120,
        src: ev.target.result
      };
      var el = createEl(d);
      selectEl(el);
    };
    reader.readAsDataURL(file);
    fi.value = '';
  };
  fi.click();
}

// ---- 添加横线 ----
function addLine(){
  var d = {
    id: 'e_line_' + Date.now(),
    type: 'line',
    x: 28, y: 300, w: 730, h: 4,
    color: '#2c3e50'
  };
  var el = createEl(d);
  selectEl(el);
}

// ---- 替换图片 ----
function replaceImg(el){
  var fi = document.getElementById('img-file-input');
  fi.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = el.querySelector('.el-img');
      if(img) img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    fi.value = '';
  };
  fi.click();
}

// ============================================================
//  保存 HTML（将当前状态序列化）
// ============================================================
function saveHTML(){
  // 先把所有图片转为 base64（如果还是外部路径则保留）
  var clone = document.getElementById('slide').cloneNode(true);
  // 移除控制点和边框
  clone.querySelectorAll('.handle,.el-border').forEach(function(n){ n.remove(); });
  clone.querySelectorAll('.el').forEach(function(el){
    el.classList.remove('selected');
    var inner = el.querySelector('.el-text');
    if(inner) inner.removeAttribute('contenteditable');
  });

  var style = document.querySelector('style').outerHTML;
  var out = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8"/>\n<title>卢腾 - 个人简历</title>\n'
    + '<style>body{margin:0;background:#fff;}#slide{width:794px;min-height:1123px;position:relative;margin:0 auto;}</style>\n'
    + '</head>\n<body>\n' + clone.outerHTML + '\n</body>\n</html>';

  var blob = new Blob([out], {type:'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '卢腾-简历.html';
  a.click();
}

// ============================================================
//  工具函数
// ============================================================
function rgbToHex(rgb){
  if(!rgb) return '#111111';
  if(rgb.startsWith('#')) return rgb;
  var m = rgb.match(/\d+/g);
  if(!m || m.length<3) return '#111111';
  return '#' + m.slice(0,3).map(function(x){ return ('0'+parseInt(x).toString(16)).slice(-2); }).join('');
}

// ============================================================
//  启动
// ============================================================
init();
</script>
