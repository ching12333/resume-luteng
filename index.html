<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>卢腾 - 简历编辑器</title>
<style>
/* ===== 全局 ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#b0b8c1;font-family:"SimSun","宋体","Microsoft YaHei",Arial,sans-serif;user-select:none;}

/* ===== 工具栏 ===== */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:#1e2a38;display:flex;align-items:center;
  gap:4px;padding:0 12px;z-index:9999;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  overflow-x:auto;
}
#toolbar::-webkit-scrollbar{height:3px;}
#toolbar::-webkit-scrollbar-thumb{background:#444;}
.sep{width:1px;height:28px;background:#3d5166;margin:0 4px;flex-shrink:0;}
.tlabel{color:#8aaccc;font-size:11px;font-family:Arial;white-space:nowrap;flex-shrink:0;}

/* 工具按钮 */
.tbtn{
  background:#2d3e50;border:1px solid #3d5166;color:#ccc;
  padding:4px 9px;border-radius:4px;cursor:pointer;
  font-size:12px;font-family:Arial;white-space:nowrap;flex-shrink:0;
  transition:background .12s;line-height:1.4;
}
.tbtn:hover{background:#3d5166;color:#fff;}
.tbtn.on{background:#2980b9;border-color:#2980b9;color:#fff;}
.tbtn.green{background:#27ae60;border-color:#27ae60;color:#fff;}
.tbtn.green:hover{background:#1e8449;}
.tbtn.red{background:#c0392b;border-color:#c0392b;color:#fff;}
.tbtn.red:hover{background:#a93226;}

/* 字号输入 */
#tb-fontsize{
  width:42px;padding:3px 4px;border:1px solid #3d5166;
  background:#2d3e50;color:#ddd;border-radius:4px;
  font-size:12px;text-align:center;flex-shrink:0;
}
/* 颜色 */
#tb-color{width:30px;height:26px;border:none;padding:0;cursor:pointer;border-radius:3px;background:none;flex-shrink:0;}

/* ===== 画布 ===== */
#canvas-wrap{margin:58px auto 40px;width:794px;}

/* ===== A4 纸 ===== */
#slide{
  width:794px;min-height:1123px;background:#fff;
  position:relative;box-shadow:0 4px 24px rgba(0,0,0,0.35);
  overflow:visible;
}

/* ===== 元素通用 ===== */
.el{position:absolute;cursor:move;min-width:20px;min-height:12px;}
.el:hover .el-border{opacity:1;}
.el.selected .el-border{opacity:1;border-color:#2980b9;}

.el-border{
  position:absolute;inset:-2px;
  border:2px dashed rgba(100,160,220,0.65);
  border-radius:2px;pointer-events:none;opacity:0;
  transition:opacity .1s;z-index:10;
}

/* 8控制点 */
.handle{
  position:absolute;width:9px;height:9px;
  background:#fff;border:2px solid #2980b9;
  border-radius:50%;z-index:20;display:none;
}
.el.selected .handle{display:block;}
.handle.nw{top:-6px;left:-6px;cursor:nw-resize;}
.handle.n {top:-6px;left:calc(50% - 4px);cursor:n-resize;}
.handle.ne{top:-6px;right:-6px;cursor:ne-resize;}
.handle.e {top:calc(50% - 4px);right:-6px;cursor:e-resize;}
.handle.se{bottom:-6px;right:-6px;cursor:se-resize;}
.handle.s {bottom:-6px;left:calc(50% - 4px);cursor:s-resize;}
.handle.sw{bottom:-6px;left:-6px;cursor:sw-resize;}
.handle.w {top:calc(50% - 4px);left:-6px;cursor:w-resize;}

/* ===== 文字内容 ===== */
.el-text{
  width:100%;height:100%;overflow:hidden;
  line-height:1.55;word-break:break-word;white-space:pre-wrap;
}
.el-text[contenteditable="true"]{
  outline:none;cursor:text;overflow:auto;user-select:text;
}

/* ===== 图片 ===== */
.el-img-wrap{width:100%;height:100%;position:relative;overflow:hidden;}
.el-img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;}
.img-replace-hint{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:11px;font-family:Arial;
  transition:background .15s,color .15s;pointer-events:none;
  border-radius:2px;
}
.el:hover .img-replace-hint{background:rgba(0,0,0,0.4);color:#fff;}

/* ===== 线条 ===== */
.el-line svg{position:absolute;inset:0;width:100%;height:100%;}

/* ===== 打印 ===== */
@media print{
  body{background:#fff;}
  #toolbar{display:none!important;}
  #canvas-wrap{margin:0;width:100%;}
  #slide{box-shadow:none;}
  .el-border,.handle,.img-replace-hint{display:none!important;}
}
</style>
</head>

<!-- ===== 工具栏 ===== -->
<div id="toolbar">
  <span style="color:#7fb3d3;font-size:13px;font-weight:bold;flex-shrink:0;">✏️ 简历</span>
  <div class="sep"></div>

  <!-- 添加 -->
  <button class="tbtn" onclick="addText()">＋文字</button>
  <button class="tbtn" onclick="addImageEl()">＋图片</button>
  <button class="tbtn" onclick="addLine()">＋横线</button>

  <div class="sep"></div>

  <!-- ★ 文字格式（作用于选中文字片段 或 整个文字块） -->
  <span class="tlabel">字号</span>
  <input id="tb-fontsize" type="number" value="13" min="6" max="120"
    title="选中文字后修改字号"
    onchange="execFmt('fontSize', null, this.value)"
    oninput="execFmt('fontSize', null, this.value)"/>

  <span class="tlabel">颜色</span>
  <input id="tb-color" type="color" value="#111111"
    title="文字颜色"
    onchange="execFmt('foreColor', this.value)"/>

  <button class="tbtn" id="btn-bold"   onclick="execFmt('bold')"   title="加粗 (Ctrl+B)"><b>B</b></button>
  <button class="tbtn" id="btn-italic" onclick="execFmt('italic')" title="斜体 (Ctrl+I)"><i>I</i></button>
  <button class="tbtn" id="btn-under"  onclick="execFmt('underline')" title="下划线"><u>U</u></button>

  <!-- 字体族 -->
  <span class="tlabel">字体</span>
  <select id="tb-font" onchange="execFmt('fontName', this.value)"
    style="background:#2d3e50;color:#ccc;border:1px solid #3d5166;border-radius:4px;padding:3px 4px;font-size:12px;flex-shrink:0;">
    <option value="SimSun,宋体">宋体</option>
    <option value="SimHei,黑体,Microsoft YaHei">黑体</option>
    <option value="KaiTi,楷体">楷体</option>
    <option value="Microsoft YaHei,微软雅黑">微软雅黑</option>
    <option value="Arial">Arial</option>
    <option value="Times New Roman">Times New Roman</option>
  </select>

  <div class="sep"></div>

  <!-- 层级 / 对齐 -->
  <button class="tbtn" onclick="bringForward()" title="上移一层">↑层</button>
  <button class="tbtn" onclick="sendBackward()" title="下移一层">↓层</button>
  <button class="tbtn" onclick="alignLeft()"   title="左对齐">⬛←</button>
  <button class="tbtn" onclick="alignCenter()" title="居中">⬛↔</button>
  <button class="tbtn" onclick="alignRight()"  title="右对齐">→⬛</button>

  <div class="sep"></div>

  <!-- 图片替换（仅图片选中时有效） -->
  <button class="tbtn" id="btn-replace-img" onclick="replaceSelectedImg()" title="替换选中图片">🖼 换图</button>

  <div class="sep"></div>

  <button class="tbtn red"   onclick="deleteSelected()" title="删除 Delete">🗑 删除</button>
  <button class="tbtn green" onclick="saveHTML()">💾 保存</button>
  <button class="tbtn"       onclick="window.print()">🖨️ 打印/PDF</button>
</div>

<!-- 隐藏文件输入 -->
<input type="file" id="img-file-input" accept="image/*" style="display:none"/>

<!-- ===== 画布 ===== -->
<div id="canvas-wrap">
  <div id="slide"></div>
</div>

// ============================================================
//  状态
// ============================================================
var selected = null;
var editingText = false;
var dragState = null;
var zCounter = 10;
var slide = document.getElementById('slide');

// ============================================================
//  初始化
// ============================================================
function init(){
  INIT_ELEMENTS.forEach(createEl);
  slide.addEventListener('mousedown', function(e){
    if(e.target === slide) deselect();
  });
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('keydown',   onKeyDown);
}

// ============================================================
//  创建元素
// ============================================================
function createEl(d){
  var el = document.createElement('div');
  el.className = 'el';
  el.id = d.id || ('el_' + Date.now() + Math.random());
  el.style.cssText = 'left:'+d.x+'px;top:'+d.y+'px;width:'+d.w+'px;height:'+d.h+'px;z-index:'+(zCounter++)+';';

  // 边框 + 控制点
  var border = document.createElement('div');
  border.className = 'el-border';
  el.appendChild(border);
  ['nw','n','ne','e','se','s','sw','w'].forEach(function(dir){
    var h = document.createElement('div');
    h.className = 'handle ' + dir;
    h.dataset.dir = dir;
    el.appendChild(h);
  });

  // 内容
  if(d.type === 'text'){
    el.dataset.eltype = 'text';
    var inner = document.createElement('div');
    inner.className = 'el-text';
    inner.style.fontSize = (d.fontSize || 13) + 'px';
    inner.style.color = d.color || '#111';
    inner.innerHTML = d.html || '';
    el.appendChild(inner);
    el.addEventListener('dblclick', function(e){ e.stopPropagation(); startTextEdit(el); });

  } else if(d.type === 'image'){
    el.dataset.eltype = 'image';
    el.dataset.src = d.src || '';
    var wrap = document.createElement('div');
    wrap.className = 'el-img-wrap';
    var img = document.createElement('img');
    img.className = 'el-img';
    img.src = d.src || '';
    img.alt = '';
    var hint = document.createElement('div');
    hint.className = 'img-replace-hint';
    hint.textContent = '双击替换图片';
    wrap.appendChild(img);
    wrap.appendChild(hint);
    el.appendChild(wrap);
    el.addEventListener('dblclick', function(e){ e.stopPropagation(); replaceImgEl(el); });

  } else if(d.type === 'line'){
    el.dataset.eltype = 'line';
    var lw = document.createElement('div');
    lw.className = 'el-line';
    lw.style.position = 'relative';
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('preserveAspectRatio','none');
    var ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1','0'); ln.setAttribute('y1','50%');
    ln.setAttribute('x2','100%'); ln.setAttribute('y2','50%');
    ln.setAttribute('stroke', d.color || '#2c3e50');
    ln.setAttribute('stroke-width','2');
    svg.appendChild(ln);
    lw.appendChild(svg);
    el.appendChild(lw);
  }

  // ★ 关键：mousedown 统一处理移动 / 缩放（图片也能拖）
  el.addEventListener('mousedown', function(e){
    // 控制点 → 缩放
    if(e.target.classList.contains('handle')){
      e.stopPropagation(); e.preventDefault();
      selectEl(el);
      startResize(e, e.target.dataset.dir, el);
      return;
    }
    // 文字编辑中点击自身 → 不拦截（让光标正常）
    if(editingText && el === selected) return;
    e.stopPropagation();
    selectEl(el);
    startMove(e, el);
  });

  slide.appendChild(el);
  return el;
}

// ============================================================
//  选中 / 取消
// ============================================================
function selectEl(el){
  if(selected && selected !== el) stopTextEdit(selected);
  if(selected) selected.classList.remove('selected');
  selected = el;
  el.classList.add('selected');
  syncToolbar(el);
}

function deselect(){
  if(selected){ stopTextEdit(selected); selected.classList.remove('selected'); selected = null; }
}

function syncToolbar(el){
  // 同步字号、颜色（读取 inner 或整体）
  var inner = el.querySelector('.el-text');
  if(inner){
    var fs = parseFloat(inner.style.fontSize) || 13;
    document.getElementById('tb-fontsize').value = fs;
    var col = inner.style.color;
    if(col) document.getElementById('tb-color').value = rgbToHex(col);
  }
}

// ============================================================
//  文字编辑
// ============================================================
function startTextEdit(el){
  var inner = el.querySelector('.el-text');
  if(!inner) return;
  inner.contentEditable = 'true';
  inner.style.cursor = 'text';
  inner.style.userSelect = 'text';
  editingText = true;
  inner.focus();
  // 阻止 inner 的 mousedown 冒泡到 el（避免触发移动）
  if(!inner._mdBound){
    inner._mdBound = true;
    inner.addEventListener('mousedown', function(e){ e.stopPropagation(); });
  }
}

function stopTextEdit(el){
  if(!el) return;
  var inner = el.querySelector('.el-text');
  if(inner){ inner.contentEditable = 'false'; inner.style.cursor = ''; inner.style.userSelect = ''; }
  editingText = false;
}

// ============================================================
//  ★ 文字格式命令（作用于当前选区 或 整个文字块）
// ============================================================
function execFmt(cmd, value, fsValue){
  // 如果当前在文字编辑模式，对选区执行
  if(editingText && selected){
    var inner = selected.querySelector('.el-text');
    if(!inner) return;
    inner.focus();
    if(cmd === 'fontSize'){
      // execCommand fontSize 只支持 1-7，改用 span 包裹
      var sel = window.getSelection();
      if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('fontSize', false, '7'); // 先设一个占位
        // 再把 font size=7 的 font 标签替换为 span style
        var fonts = inner.querySelectorAll('font[size="7"]');
        fonts.forEach(function(f){
          var span = document.createElement('span');
          span.style.fontSize = fsValue + 'px';
          span.innerHTML = f.innerHTML;
          f.parentNode.replaceChild(span, f);
        });
      } else {
        // 无选区 → 改整个块
        inner.style.fontSize = fsValue + 'px';
      }
    } else if(cmd === 'foreColor'){
      document.execCommand('styleWithCSS', false, true);
      document.execCommand('foreColor', false, value);
    } else if(cmd === 'fontName'){
      document.execCommand('styleWithCSS', false, true);
      document.execCommand('fontName', false, value);
    } else {
      document.execCommand(cmd, false, value);
    }
    // 更新按钮状态
    updateFmtButtons();
    return;
  }
  // 非编辑模式 → 改整个文字块
  if(!selected) return;
  var inner = selected.querySelector('.el-text');
  if(!inner) return;
  if(cmd === 'fontSize'){
    inner.style.fontSize = fsValue + 'px';
  } else if(cmd === 'foreColor'){
    inner.style.color = value;
  } else if(cmd === 'bold'){
    inner.style.fontWeight = inner.style.fontWeight === 'bold' ? '' : 'bold';
  } else if(cmd === 'italic'){
    inner.style.fontStyle = inner.style.fontStyle === 'italic' ? '' : 'italic';
  } else if(cmd === 'underline'){
    inner.style.textDecoration = inner.style.textDecoration === 'underline' ? '' : 'underline';
  } else if(cmd === 'fontName'){
    inner.style.fontFamily = value;
  }
}

function updateFmtButtons(){
  document.getElementById('btn-bold').classList.toggle('on', document.queryCommandState('bold'));
  document.getElementById('btn-italic').classList.toggle('on', document.queryCommandState('italic'));
  document.getElementById('btn-under').classList.toggle('on', document.queryCommandState('underline'));
}

// ============================================================
//  拖拽移动
// ============================================================
function startMove(e, el){
  dragState = {
    type:'move', el:el,
    startX:e.clientX, startY:e.clientY,
    origX:parseInt(el.style.left)||0,
    origY:parseInt(el.style.top)||0
  };
}

// ============================================================
//  缩放
// ============================================================
function startResize(e, dir, el){
  dragState = {
    type:'resize', dir:dir, el:el,
    startX:e.clientX, startY:e.clientY,
    origX:parseInt(el.style.left)||0,
    origY:parseInt(el.style.top)||0,
    origW:parseInt(el.style.width)||100,
    origH:parseInt(el.style.height)||20
  };
}

// ============================================================
//  全局鼠标移动 / 抬起
// ============================================================
function onMouseMove(e){
  if(!dragState) return;
  var dx = e.clientX - dragState.startX;
  var dy = e.clientY - dragState.startY;
  var el = dragState.el;
  if(dragState.type === 'move'){
    el.style.left = Math.max(0, dragState.origX + dx) + 'px';
    el.style.top  = Math.max(0, dragState.origY + dy) + 'px';
  } else {
    var d=dragState.dir, nx=dragState.origX, ny=dragState.origY;
    var nw=dragState.origW, nh=dragState.origH;
    if(d.includes('e')) nw=Math.max(20,dragState.origW+dx);
    if(d.includes('s')) nh=Math.max(10,dragState.origH+dy);
    if(d.includes('w')){ nw=Math.max(20,dragState.origW-dx); nx=dragState.origX+dragState.origW-nw; }
    if(d.includes('n')){ nh=Math.max(10,dragState.origH-dy); ny=dragState.origY+dragState.origH-nh; }
    el.style.left=nx+'px'; el.style.top=ny+'px';
    el.style.width=nw+'px'; el.style.height=nh+'px';
  }
}
function onMouseUp(){ dragState=null; }

// ============================================================
//  键盘
// ============================================================
function onKeyDown(e){
  if(editingText) return;
  if(!selected) return;
  if((e.key==='Delete'||e.key==='Backspace') && document.activeElement.tagName!=='INPUT'){
    deleteSelected(); return;
  }
  var step = e.shiftKey ? 10 : 1;
  if(e.key==='ArrowLeft'){  selected.style.left=(parseInt(selected.style.left)-step)+'px'; e.preventDefault(); }
  if(e.key==='ArrowRight'){ selected.style.left=(parseInt(selected.style.left)+step)+'px'; e.preventDefault(); }
  if(e.key==='ArrowUp'){    selected.style.top=(parseInt(selected.style.top)-step)+'px';   e.preventDefault(); }
  if(e.key==='ArrowDown'){  selected.style.top=(parseInt(selected.style.top)+step)+'px';   e.preventDefault(); }
}

// ============================================================
//  工具栏操作
// ============================================================
function bringForward(){ if(selected) selected.style.zIndex=++zCounter; }
function sendBackward(){ if(selected){ var z=parseInt(selected.style.zIndex); if(z>1) selected.style.zIndex=z-1; } }
function alignLeft(){   if(selected) selected.style.left='28px'; }
function alignCenter(){ if(selected){ var w=parseInt(selected.style.width); selected.style.left=Math.round((794-w)/2)+'px'; } }
function alignRight(){  if(selected){ var w=parseInt(selected.style.width); selected.style.left=(794-w-28)+'px'; } }
function deleteSelected(){ if(selected){ selected.remove(); selected=null; editingText=false; } }

function addText(){
  var el=createEl({type:'text',x:100,y:200,w:300,h:30,html:'双击编辑文字',fontSize:14,color:'#111'});
  selectEl(el);
}
function addImageEl(){
  var fi=document.getElementById('img-file-input');
  fi.onchange=function(e){
    var file=e.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var el=createEl({type:'image',x:100,y:200,w:120,h:120,src:ev.target.result});
      selectEl(el);
    };
    reader.readAsDataURL(file); fi.value='';
  };
  fi.click();
}
function addLine(){
  var el=createEl({type:'line',x:28,y:300,w:730,h:4,color:'#2c3e50'});
  selectEl(el);
}

// 替换选中图片（工具栏按钮）
function replaceSelectedImg(){
  if(!selected || selected.dataset.eltype !== 'image') return;
  replaceImgEl(selected);
}
function replaceImgEl(el){
  var fi=document.getElementById('img-file-input');
  fi.onchange=function(e){
    var file=e.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=el.querySelector('.el-img');
      if(img) img.src=ev.target.result;
    };
    reader.readAsDataURL(file); fi.value='';
  };
  fi.click();
}

// ============================================================
//  保存 HTML
// ============================================================
function saveHTML(){
  var clone=document.getElementById('slide').cloneNode(true);
  clone.querySelectorAll('.handle,.el-border,.img-replace-hint').forEach(function(n){n.remove();});
  clone.querySelectorAll('.el').forEach(function(el){
    el.classList.remove('selected');
    var inner=el.querySelector('.el-text');
    if(inner) inner.removeAttribute('contenteditable');
  });
  var out='<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8"/>\n<title>卢腾 - 个人简历</title>\n'
    +'<style>body{margin:0;background:#fff;}#slide{width:794px;min-height:1123px;position:relative;margin:0 auto;}.el{position:absolute;}.el-text{width:100%;height:100%;overflow:hidden;line-height:1.55;word-break:break-word;white-space:pre-wrap;}.el-img-wrap{width:100%;height:100%;overflow:hidden;}.el-img{width:100%;height:100%;object-fit:contain;display:block;}.el-line{position:relative;width:100%;height:100%;}.el-line svg{position:absolute;inset:0;width:100%;height:100%;}</style>\n'
    +'</head>\n<body>\n'+clone.outerHTML+'\n</body>\n</html>';
  var blob=new Blob([out],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='卢腾-简历.html'; a.click();
}

// ============================================================
//  工具函数
// ============================================================
function rgbToHex(rgb){
  if(!rgb) return '#111111';
  if(rgb.startsWith('#')) return rgb;
  var m=rgb.match(/\d+/g);
  if(!m||m.length<3) return '#111111';
  return '#'+m.slice(0,3).map(function(x){return('0'+parseInt(x).toString(16)).slice(-2);}).join('');
}

// ============================================================
//  启动
// ============================================================
init();
